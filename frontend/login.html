<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded shadow w-80">

        <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

        <form id="loginForm" class="space-y-4">

            <input id="email" type="email" placeholder="Email" class="w-full border p-2 rounded" required />

            <input id="password" type="password" placeholder="Password" class="w-full border p-2 rounded" required />

            <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
                Login
            </button>

        </form>

        <p id="msg" class="text-red-500 mt-2 text-sm"></p>

        <div class="text-center mt-4">
            <p class="text-sm text-gray-600">New user?</p>
            <a href="register.html" class="text-blue-500 hover:underline">
                Register here
            </a>
        </div>

    </div>

    <script>

        const API = "http://localhost:3000"

        document.getElementById("loginForm").addEventListener("submit", async (e) => {

            e.preventDefault()

            const email = document.getElementById("email").value
            const password = document.getElementById("password").value

            const res = await fetch(`${API}/login`, {
                method: "POST",
                credentials: "include",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            })

            const data = await res.json()

            if (data.success) {

                window.location.href = "home.html"

            } else {

                document.getElementById("msg").innerText = "Invalid login"

            }

        })

    </script>

</body>

</html>
