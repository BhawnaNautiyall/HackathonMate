<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded shadow w-96">

        <h2 class="text-2xl font-bold text-center mb-6">Register</h2>

        <form id="registerForm" class="space-y-3">

            <input id="name" placeholder="Name" class="w-full border p-2 rounded" required>

            <input id="email" type="email" placeholder="Email" class="w-full border p-2 rounded" required>

            <input id="phone" placeholder="Phone Number" class="w-full border p-2 rounded" required>

            <input id="password" type="password" placeholder="Password" class="w-full border p-2 rounded" required>

            <select id="year" class="w-full border p-2 rounded" required>
                <option value="">Select Graduation Year</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
            </select>

            <input id="branch" placeholder="Branch" class="w-full border p-2 rounded" required>

            <button class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">
                Register
            </button>

        </form>

        <p id="msg" class="text-red-500 mt-2 text-sm"></p>

    </div>

    <script>

        const API = "https://hackathonmate-api.onrender.com"

        document.getElementById("registerForm").addEventListener("submit", async (e) => {

            e.preventDefault()

            const user = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                password: document.getElementById("password").value,
                year: document.getElementById("year").value,
                branch: document.getElementById("branch").value
            }

            const res = await fetch(`${API}/register`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(user)
            })

            const data = await res.json()

            if (data.success) {

                alert("Registered successfully")
                window.location.href = "login.html"

            } else {

                document.getElementById("msg").innerText = "Registration failed"

            }

        })

    </script>

</body>

</html>
